name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ai-session tests
        run: ./test/ai-session.test.sh

      - name: Lint bin/ai-session with shellcheck
        run: shellcheck bin/ai-session test/ai-session.test.sh
